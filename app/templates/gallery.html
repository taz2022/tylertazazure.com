{% extends "base.html" %}
{% block title %}Gallery — {{ site.title }}{% endblock %}
{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/page-hub.css') }}">
{% endblock %}

{% block content %}
<main class="gallery-page">

  <section class="gallery-hero">
    <div class="gallery-hero__inner">
      <div class="section-label">{{ gallery.hero.subtitle }}</div>
      <h1 class="gallery-hero__title">{{ gallery.hero.title }}</h1>
    </div>
  </section>

  <section class="gallery-grid-section">
    <div class="gallery-grid-wrap">
      <div class="gallery-grid">
        {% for img in gallery.images %}
        <div class="gallery-grid__item" data-full="{{ url_for('static', filename='images/' ~ img) }}">
          <img src="{{ url_for('static', filename='images/' ~ img) }}"
               alt="Live photo" loading="lazy" />
        </div>
        {% endfor %}
      </div>
    </div>
  </section>

  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" aria-label="Close">&times;</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="Full size photo" />
  </div>

</main>
{% endblock %}

{% block scripts %}
<script>
(function initLightbox() {
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightboxImg');
  var items = document.querySelectorAll('.gallery-grid__item');

  items.forEach(function(item) {
    item.style.cursor = 'pointer';
    item.addEventListener('click', function() {
      lightboxImg.src = item.getAttribute('data-full');
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });

  lightbox.addEventListener('click', function(e) {
    if (e.target !== lightboxImg) {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lightbox.classList.contains('open')) {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
  });
})();
</script>
{% endblock %}
