<section
  class="hero{% if hero.background_image %} hero--has-image{% endif %}"
  id="home"
  {% if hero.background_image %}
  style="--hero-bg: url('{{ hero.background_image }}')"
  {% endif %}
  aria-label="Introduction"
>
  <div class="hero__overlay" aria-hidden="true"></div>
  <div class="hero__grain" aria-hidden="true"></div>

  <div class="container hero__content">
    <div class="hero__badge reveal" aria-hidden="true">
      <span class="hero__badge-dot"></span>
      Available for projects
    </div>

    <h1 class="hero__name reveal reveal--delay-1">
      {{ hero.name }}
    </h1>

    <p class="hero__headline reveal reveal--delay-2">
      {{ hero.headline }}
    </p>

    <p class="hero__sub reveal reveal--delay-3">
      {{ hero.subheadline }}
    </p>

    <div class="hero__actions reveal reveal--delay-4">
      <a href="{{ hero.cta_primary.href }}" class="btn btn--primary btn--lg">
        {{ hero.cta_primary.label }}
      </a>
      <a href="{{ hero.cta_secondary.href }}" class="btn btn--ghost btn--lg">
        {{ hero.cta_secondary.label }}
      </a>
    </div>

    <div class="hero__scroll reveal reveal--delay-5" aria-hidden="true">
      <span class="hero__scroll-line"></span>
      <span class="hero__scroll-label">Scroll</span>
    </div>
  </div>

  <!-- Decorative orbs -->
  <div class="hero__orb hero__orb--1" aria-hidden="true"></div>
  <div class="hero__orb hero__orb--2" aria-hidden="true"></div>
</section>
