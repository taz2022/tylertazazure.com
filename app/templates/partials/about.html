<section class="section about" id="about" aria-labelledby="about-heading">
  <div class="container">
    <div class="about__grid">

      <!-- Portrait -->
      <div class="about__image-col scroll-reveal">
        <div class="about__image-frame">
          {% if about.portrait_image %}
          <img
            src="{{ about.portrait_image }}"
            alt="Tyler Azure"
            class="about__portrait"
            loading="lazy"
          />
          {% else %}
          <div class="about__portrait-placeholder" aria-label="Tyler Azure portrait placeholder">
            <span class="about__initials">TA</span>
          </div>
          {% endif %}
          <div class="about__image-accent" aria-hidden="true"></div>
        </div>
      </div>

      <!-- Text -->
      <div class="about__text-col scroll-reveal">
        <div class="section-label">About</div>
        <h2 class="section-heading" id="about-heading">
          Three disciplines.<br />One point of view.
        </h2>
        <p class="about__intro">{{ about.intro }}</p>
        <p class="about__body">{{ about.body }}</p>
      </div>

    </div>

    <!-- Stats -->
    <div class="about__stats scroll-reveal">
      {% for stat in about.stats %}
      <div class="stat-card">
        <span class="stat-card__value">{{ stat.value }}</span>
        <span class="stat-card__label">{{ stat.label }}</span>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
