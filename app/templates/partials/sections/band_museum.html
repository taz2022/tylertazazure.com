<section class="band band--museum scroll-reveal">
  <div class="band__inner band__inner--right">
    <div class="band__num">{{ band.number }}</div>
    <div class="band__kicker band__kicker--serif">{{ band.kicker }}</div>
    <h2 class="band__title">{{ band.title }}</h2>
    <p class="band__body">{{ band.body }}</p>
    <div class="band__tags">
      {% for tag in band.tags %}
      <span class="band__tag band__tag--museum">{{ tag }}</span>
      {% endfor %}
    </div>
    <a href="{{ band.cta_href }}" class="btn btn--ghost">{{ band.cta_label }} &rarr;</a>
  </div>
</section>
