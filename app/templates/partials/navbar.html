<header class="navbar" id="navbar" role="banner">
  <div class="navbar__inner container">
    <a href="#" class="navbar__brand" aria-label="Tyler Azure — Home">
      <span class="navbar__name">Tyler Azure</span>
      <span class="navbar__dot" aria-hidden="true">.</span>
    </a>

    <nav class="navbar__nav" aria-label="Main navigation">
      <ul class="navbar__links" role="list">
        {% for link in nav_links %}
        <li>
          <a href="{{ link.href }}" class="navbar__link">{{ link.label }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>

    <a href="#contact" class="btn btn--outline btn--sm navbar__cta">
      Let's Talk
    </a>

    <button class="navbar__toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="mobileMenu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <nav aria-label="Mobile navigation">
      <ul class="mobile-menu__links" role="list">
        {% for link in nav_links %}
        <li>
          <a href="{{ link.href }}" class="mobile-menu__link">{{ link.label }}</a>
        </li>
        {% endfor %}
        <li>
          <a href="#contact" class="btn btn--primary mobile-menu__cta">Let's Talk</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
