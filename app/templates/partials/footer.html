<footer class="footer" role="contentinfo">
  <div class="container footer__inner">
    <div class="footer__brand">
      <span class="footer__name">Tyler "Taz" Azure</span>
      <span class="footer__tagline">{{ footer.tagline }}</span>
    </div>

    {% if footer.social_links %}
    <div class="footer__socials">
      {% for link in footer.social_links %}
      <a href="{{ link.url }}" class="social-link" target="_blank" rel="noopener">{{ link.platform }}</a>
      {% endfor %}
    </div>
    {% endif %}

    <div class="footer__bottom">
      <p class="footer__copy">
        &copy; {{ current_year }} {{ footer.copyright }}. All rights reserved.
      </p>
    </div>
  </div>
</footer>
